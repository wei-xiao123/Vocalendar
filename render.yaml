services:
  - type: web
    name: vocalendar-api
    runtime: python
    rootDir: apps/api
    buildCommand: pip install -e ".[dev]"
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: API_ENV
        value: production
      - key: API_CORS_ORIGINS
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: vocalendar-db
          property: connectionString

  - type: web
    name: vocalendar-web
    runtime: static
    rootDir: apps/web
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: NODE_VERSION
        value: 24.11.1
      - key: VITE_API_URL
        sync: false

databases:
  - name: vocalendar-db
    databaseName: vocalendar
    user: vocalendar
